# /etc/turnserver.conf — coturn configuration for Paracosma virtual office
#
# This file should be placed at /etc/turnserver.conf on the VM (192.168.10.12).
# The TURN server relays WebRTC media when direct peer-to-peer fails (symmetric NAT, firewalls).

# ─── Network ────────────────────────────────────────────────────────────
# The IP address that the VM actually listens on (internal/private)
listening-ip=192.168.10.12
listening-port=3478
tls-listening-port=5349

# The public IP that external clients use to reach this TURN server
# (the router/firewall forwards traffic from this IP to 192.168.10.12)
external-ip=124.41.211.221/192.168.10.12

# Relay port range — must match your firewall/NAT port-forwarding rules
min-port=49160
max-port=49200

# ─── Authentication ─────────────────────────────────────────────────────
# Use the same shared secret as the app server (.env TURN_SHARED_SECRET).
# The app server generates time-limited credentials via HMAC-SHA1.
use-auth-secret
static-auth-secret=XzJpqqUoffJ59dJZDK2x+XVffgB3OYdteGNVvoj6x1ceBkWfb14xpEFlCCtIw+IO

realm=paracosma

# ─── TLS (for turns: on port 5349) ──────────────────────────────────────
# Self-signed cert is fine for TURN relay (not shown in browser UI).
# Generate with:  scripts/setup_coturn.sh
cert=/etc/turn_server_cert.pem
pkey=/etc/turn_server_pkey.pem

# ─── Security ───────────────────────────────────────────────────────────
no-multicast-peers
no-cli
fingerprint

# Prevent relay to private/loopback ranges
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# ─── Logging ────────────────────────────────────────────────────────────
log-file=/var/log/turnserver.log
verbose
