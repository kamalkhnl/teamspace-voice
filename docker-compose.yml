services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_PEER_ICE_SERVERS: ${VITE_PEER_ICE_SERVERS:-[{"urls":["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"]}]}
        VITE_PEER_HOST: ${VITE_PEER_HOST:-}
        VITE_PEER_PORT: ${VITE_PEER_PORT:-}
        VITE_PEER_PATH: ${VITE_PEER_PATH:-}
        VITE_PEER_SECURE: ${VITE_PEER_SECURE:-}
    container_name: gather-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      TURN_URLS: ${TURN_URLS:-}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET:-}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS:-86400}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gather-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gather-cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - gather-net

networks:
  gather-net:
    driver: bridge
