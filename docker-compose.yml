services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gather-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gather-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: gather-cloudflared
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - gather-net

networks:
  gather-net:
    driver: bridge
